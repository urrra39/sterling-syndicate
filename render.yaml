# Render Blueprint for The Sterling Syndicate.
#
# One-click deploy: push this file, then in the Render dashboard choose
# "New +" → "Blueprint" and point it at this repo. Render provisions the
# database and both services, wiring the cross-service values below.
#
# Two secrets can't be auto-generated and MUST be set once (see DEPLOY.md):
#   • FIELD_ENCRYPTION_KEY  — 32-byte url-safe base64 Fernet key
#   • OPENAI_API_KEY        — only if you use the LLM features
#
# Note: the Docker-in-Docker Execution sandbox from docker-compose is NOT part
# of this deploy (Render has no privileged DinD). The core app — auth, leads,
# proposals, CRM, analytics — runs fully; SANDBOX_ALLOW_SUBPROCESS_FALLBACK is
# left false so no untrusted code runs on the host.
#
# The frontend deploys as a Render Static Site (free, never sleeps, no build
# memory cap). The backend stays a Docker web service.

databases:
  - name: sterling-db
    plan: free
    databaseName: sterling
    user: sterling
    postgresMajorVersion: "16"
    # pgvector ships on Render's Postgres 16; migration 0001 runs CREATE
    # EXTENSION IF NOT EXISTS vector on first boot.

services:
  # ── Backend API (FastAPI) ────────────────────────────────────────────
  - type: web
    name: sterling-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sterling-db
          property: connectionString
      # Auto-generated once, then stable across deploys.
      - key: JWT_SECRET_KEY
        generateValue: true
      # Must be set manually in the dashboard (Fernet key — see DEPLOY.md).
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      # Optional: only needed for LLM-backed drafting/replies.
      - key: OPENAI_API_KEY
        sync: false
      # Allow the deployed frontend origin to make credentialed calls.
      # fromService `property: host` injects only the bare service name
      # (e.g. "sterling-web-6u7n") without ".onrender.com", so the allow-list
      # entry never matches the browser's real Origin and CORS blocks every
      # request. Pin the full frontend origin instead.
      # (Update this if the web service URL ever changes.)
      - key: CORS_ORIGINS
        value: https://sterling-web-6u7n.onrender.com
      - key: SANDBOX_ALLOW_SUBPROCESS_FALLBACK
        value: "false"
      - key: UVICORN_WORKERS
        value: "2"

  # ── Frontend (Vite SPA as a Render Static Site) ──────────────────────
  # Static sites are free, never sleep, and build outside the memory-capped
  # container runtime — so the Docker build failure no longer applies.
  - type: web
    runtime: static
    name: sterling-web
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    # SPA history fallback: serve index.html for any client-side route so a
    # hard refresh on /login, /leads/:id, or /analytics doesn't 404.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Security headers (the nginx image used to add these; preserve them here).
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      # Vite inlines VITE_* at build time. fromService `property: host` bakes in
      # only the bare service name (e.g. "sterling-api-6u7n") without the
      # ".onrender.com" suffix, which produces an unreachable URL. Pin the full
      # public API origin so the built bundle fetches an absolute, valid host.
      # (Update this if the API service URL ever changes.)
      - key: VITE_API_URL
        value: https://sterling-api-6u7n.onrender.com
