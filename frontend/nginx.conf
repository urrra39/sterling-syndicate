server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Strict security headers on every response ──────────────────────
    # HSTS: force HTTPS for 2 years incl. subdomains (harmless over plain
    # HTTP; only honoured by browsers once served via TLS at the edge).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Content Security Policy: lock script/style to same-origin, forbid framing,
    # and only allow XHR/fetch to same-origin + HTTPS APIs. 'unsafe-inline' is
    # limited to styles (Tailwind runtime) — never scripts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: http://localhost:8000 http://127.0.0.1:8000; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Do not leak the nginx version.
    server_tokens off;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived immutable hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }
}
